name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build (debug)
        run: swift build
      - name: Build app bundle and DMG
        run: |
          ./scripts/make-app.sh
          ./scripts/make-dmg.sh
