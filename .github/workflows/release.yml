name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Info.plist version
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Support/Info.plist)"
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Info.plist version ${VERSION}" >&2
            exit 1
          fi

      - name: Build app bundle
        run: ./scripts/make-app.sh

      - name: Build DMG
        run: ./scripts/make-dmg.sh

      - name: Zip app bundle
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Support/Info.plist)"
          ditto -c -k --keepParent build/MicPause.app "build/MicPause-${VERSION}.zip"

      - name: Checksums
        run: |
          cd build
          shasum -a 256 MicPause-*.dmg MicPause-*.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/MicPause-*.dmg build/MicPause-*.zip build/checksums.txt \
            --title "MicPause ${GITHUB_REF_NAME}" \
            --generate-notes
